version: '3.8'

services:
  flow2api:
    build: .
    container_name: flow2api
    ports:
      - "9000:9000"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config/setting.toml:/app/config/setting.toml
      - ./src:/app/src
      - ./main.py:/app/main.py
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
