version: '3.8'
services:
  flow2api-headed:
    init: true
    build:
      context: .
      dockerfile: Dockerfile.headed
    image: flow2api:headed
    container_name: flow2api-8001
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config/setting.toml:/app/config/setting.toml
      - ./src:/app/src:ro
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOW_DOCKER_HEADED_CAPTCHA=true
      - DISPLAY=:99
      - XVFB_SCREEN=1440x900x24
      - PERSONAL_BROWSER_HEADLESS=0
    shm_size: "2gb"
    restart: unless-stopped
    command: >
      sh -c "mkdir -p /tmp/.X11-unix && chmod 1777 /tmp/.X11-unix &&
             rm -f /tmp/.X99-lock &&
             Xvfb :99 -screen 0 1440x900x24 -ac +extension RANDR > /tmp/xvfb.log 2>&1 &
             sleep 2 &&
             fluxbox > /tmp/fluxbox.log 2>&1 &
             sleep 1 &&
             exec python -m uvicorn main:app --host 0.0.0.0 --port 8001 --workers 1"